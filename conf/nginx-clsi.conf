# keep in sync with services/clsi/nginx.conf
# Changes to the above:
#  - added Security-Headers
#  - remove CORS rules, Server-CE/Server-Pro runs behind a single origin
#  - change /output path to /var/lib/overleaf/data/output
#  - remove tiny.pdf endpoints

server {
  more_set_headers "X-Served-By: clsi-nginx"

  # Security-Headers
  more_set_headers "X-Content-Type-Options: nosniff";
  more_set_headers "X-Download-Options: noopen";
  more_set_headers "X-Frame-Options: SAMEORIGIN";
  more_set_headers "X-XSS-Protection: 1; mode=block";

  listen __PORT_DOWNLOAD__;
  server_name clsi-nginx;
  server_tokens off;
  access_log off;
  # Ignore symlinks possibly created by users
  disable_symlinks on;
  # enable compression for tex auxiliary files, but not for pdf files
  gzip on;
  gzip_types text/plain;
  gzip_proxied any;
  types {
      text/plain log blg aux stdout stderr;
      application/pdf pdf;
  }
  # handle output files for specific users
  location ~ ^__PATH__/project/([0-9a-f]+)/user/([0-9a-f]+)/build/([0-9a-f-]+)/output/(.+)$ {
    rewrite ^__PATH__/project/([0-9a-f]+)/user/([0-9a-f]+)/build/([0-9a-f-]+)/output/(.+)$ /$4 break;
    root __DATA_DIR__/output/$1-$2/generated-files/$3/;
  }
  # handle output files for anonymous users
  location ~ ^__PATH__/project/([0-9a-f]+)/build/([0-9a-f-]+)/output/(.+)$ {
    rewrite ^__PATH__/project/([0-9a-f]+)/build/([0-9a-f-]+)/output/(.+)$ /$3 break;
    root __DATA_DIR__/output/$1/generated-files/$2/;
  }

  # PDF range for specific users
  location ~ ^__PATH__/project/([0-9a-f]+)/user/([0-9a-f]+)/content/([0-9a-f-]+/[0-9a-f]+)$ {
    # Cache for one day
    expires 1d;
    alias __DATA_DIR__/output/$1-$2/content/$3;
  }
  # PDF range for anonymous users
  location ~ ^__PATH__/project/([0-9a-f]+)/content/([0-9a-f-]+/[0-9a-f]+)$ {
    # Cache for one day
    expires 1d;
    alias __DATA_DIR__/output/$1/content/$2;
  }

  # Do not look up any non matching files in the default root.
  location __PATH__/ {
    return 404;
  }
}